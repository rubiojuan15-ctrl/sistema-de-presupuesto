<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Recuperar contraseña</title>

    <style>
        body{
            font-family:Arial,sans-serif;
            background:#f5f5f5;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            width:350px;
            background:white;
            padding:25px;
            border-radius:12px;
            box-shadow:0 5px 20px rgba(0,0,0,.15);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:12px;
            border:1px solid #ccc;
            border-radius:8px;
            box-sizing:border-box;
        }

        button{
            width:100%;
            margin-top:20px;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#9b6b46;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            opacity:.9;
        }
    </style>

</head>

<body>

<div class="card">

<h2>Nueva contraseña</h2>

<input
id="password"
type="password"
placeholder="Nueva contraseña">

<input
id="confirmar"
type="password"
placeholder="Confirmar contraseña">

<button onclick="guardar()">
Guardar contraseña
</button>

</div>

<script>

async function guardar(){

    const params=new URLSearchParams(location.search);

    const token=params.get("token");

    const password=document.getElementById("password").value;

    const confirmar=document.getElementById("confirmar").value;

    if(password.length<6){

        alert("La contraseña debe tener al menos 6 caracteres");

        return;

    }

    if(password!==confirmar){

        alert("Las contraseñas no coinciden");

        return;

    }

    const respuesta=await fetch("/reset-password",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({

            token,

            password

        })

    });

    alert(await respuesta.text());

    if(respuesta.ok){

        location.href="/";

    }

}

</script>

</body>

</html>
